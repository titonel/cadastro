<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cadastro de Prestadores – AME Caraguatatuba{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-bg: #f7f6f2;
      --color-surface: #ffffff;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-error: #a12c7b;
      --color-success: #437a22;
      --color-warning: #964219;
      --radius: 0.5rem;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
    }
    body { font-family: 'Inter', sans-serif; font-size: 0.9375rem; color: var(--color-text); background: var(--color-bg); min-height: 100vh; }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { color: var(--color-primary-hover); text-decoration: underline; }
    .navbar { background: var(--color-primary); color: #fff; padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 56px; }
    .navbar-brand { color: #fff; font-weight: 700; font-size: 1rem; letter-spacing: .02em; }
    .navbar-brand:hover { color: #fff; text-decoration: none; }
    .navbar-nav { display: flex; gap: 1.25rem; list-style: none; margin-left: auto; }
    .navbar-nav a { color: rgba(255,255,255,.85); font-size: .875rem; font-weight: 500; }
    .navbar-nav a:hover { color: #fff; text-decoration: none; }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
    .page-title { font-size: 1.375rem; font-weight: 700; }
    .btn { display: inline-flex; align-items: center; gap: .375rem; padding: .5rem 1rem; border-radius: var(--radius); font-size: .875rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: background .15s, border-color .15s; text-decoration: none; }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-hover); color: #fff; text-decoration: none; }
    .btn-secondary { background: transparent; border-color: var(--color-border); color: var(--color-text); }
    .btn-secondary:hover { background: #edeae5; text-decoration: none; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-danger:hover { background: #b02a37; text-decoration: none; }
    .btn-sm { padding: .3rem .7rem; font-size: .8125rem; }
    .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 1.25rem 1.5rem; box-shadow: var(--shadow); }
    .card + .card { margin-top: 1rem; }
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { text-align: left; padding: .6rem .75rem; border-bottom: 2px solid var(--color-border); font-weight: 600; color: var(--color-text-muted); font-size: .8125rem; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    td { padding: .65rem .75rem; border-bottom: 1px solid #edeae5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7f6f2; }
    .form-section { margin-bottom: 1.75rem; }
    .form-section-title { font-size: .9375rem; font-weight: 700; color: var(--color-primary); border-bottom: 2px solid var(--color-primary); padding-bottom: .4rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .35rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .8125rem; font-weight: 600; color: var(--color-text-muted); }
    .form-control { border: 1px solid var(--color-border); border-radius: var(--radius); padding: .45rem .7rem; font-size: .9rem; font-family: inherit; color: var(--color-text); background: #fff; width: 100%; transition: border-color .15s, box-shadow .15s; }
    .form-control:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(1,105,111,.12); }
    .checkbox-list { list-style: none; display: flex; flex-wrap: wrap; gap: .5rem; }
    .checkbox-list li label { display: flex; align-items: center; gap: .35rem; font-weight: 500; font-size: .875rem; color: var(--color-text); cursor: pointer; background: #f0f7f7; padding: .25rem .7rem; border-radius: 999px; border: 1px solid #cedcd8; }
    .checkbox-list li input[type=checkbox] { accent-color: var(--color-primary); }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
    .badge-active { background: #d4dfcc; color: #1e3f0a; }
    .badge-inactive { background: #e0ced7; color: #561740; }
    .badge-esp { background: #cedcd8; color: #0f3638; }
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li { padding: .75rem 1rem; border-radius: var(--radius); font-size: .875rem; margin-bottom: .5rem; }
    .messages .success { background: #d4dfcc; color: #1e3f0a; }
    .messages .error { background: #e0ced7; color: #561740; }
    .messages .warning { background: #ddcfc6; color: #4b2614; }
    .formset-row { background: #fafaf8; border: 1px solid #edeae5; border-radius: var(--radius); padding: 1rem; margin-bottom: .75rem; position: relative; }
    .formset-delete { position: absolute; top: .75rem; right: .75rem; }
    .formset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; }
    .search-bar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.25rem; }
    .search-bar .form-control { max-width: 280px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-label { font-size: .775rem; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .04em; }
    .detail-value { font-size: .9375rem; margin-top: .15rem; }
    .valor-box { background: linear-gradient(135deg, var(--color-primary) 0%, #0c4e54 100%); color: #fff; border-radius: var(--radius); padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: .25rem; }
    .valor-box .label { font-size: .8rem; opacity: .85; font-weight: 500; }
    .valor-box .value { font-size: 1.5rem; font-weight: 700; }
    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .formset-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="{% url 'cadastro:prestador_list' %}">
      &#x2665; AME Caraguatatuba — Prestadores
    </a>
    <ul class="navbar-nav">
      <li><a href="{% url 'cadastro:prestador_list' %}">Listar</a></li>
      <li><a href="{% url 'cadastro:prestador_create' %}">+ Novo</a></li>
    </ul>
  </nav>
  <div class="container">
    {% if messages %}
    <ul class="messages">
      {% for msg in messages %}
      <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
