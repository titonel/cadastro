{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Âmbar — AME Caraguatatuba{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'cadastro/estilo-ambar.css' %}">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="{% url 'cadastro:home' %}">
      <!-- Âmbar gem SVG -->
      <svg class="navbar-gem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="12" cy="13" rx="8.5" ry="7" fill="#FFBF00" opacity=".9"/>
        <ellipse cx="12" cy="13" rx="8.5" ry="7" fill="url(#gem-grad)" opacity=".6"/>
        <ellipse cx="12" cy="13" rx="6" ry="4.8" fill="#FFD84D" opacity=".5"/>
        <defs>
          <radialGradient id="gem-grad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#FFE680"/>
            <stop offset="100%" stop-color="#C87000"/>
          </radialGradient>
        </defs>
      </svg>
      Âmbar
    </a>

    <div class="navbar-divider"></div>

    <ul class="navbar-nav">
      <li><a href="{% url 'cadastro:acompanhamento' %}">Acompanhamento</a></li>
      <li><a href="{% url 'cadastro:relatorio' %}">Relatório</a></li>
      <li><a href="{% url 'cadastro:prestador_list' %}">Prestadores</a></li>
      <li><a href="{% url 'cadastro:contrato_upload' %}">Contratos</a></li>
    </ul>

    <div class="navbar-spacer"></div>

    <a href="{% url 'cadastro:home' %}" class="navbar-home-link">AME Caraguatatuba</a>
  </nav>

  <div class="container">
    {% if messages %}
    <ul class="messages">
      {% for msg in messages %}
      <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
