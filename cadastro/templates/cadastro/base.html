<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Âmbar — AME Caraguatatuba{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Paleta Dia Ensolarado */
      --amber:        #FFBF00;
      --amber-dark:   #807040;
      --blue:         #007EFF;
      --blue-deep:    #2400FF;

      /* Superfícies */
      --color-bg:      #FFFDF5;
      --color-surface: #FFFFFF;
      --color-border:  #E8DFB8;

      /* Texto */
      --color-text:       #2A1F00;
      --color-text-muted: #6B5B2E;

      /* Semânticas */
      --color-primary:       var(--amber);
      --color-primary-hover: #E6AC00;
      --color-accent:        var(--blue);
      --color-accent-deep:   var(--blue-deep);
      --color-error:         #C0392B;
      --color-success:       #1E7C3A;
      --color-warning:       var(--amber-dark);

      --radius:  0.5rem;
      --radius-lg: 0.875rem;
      --shadow:  0 1px 3px rgba(128,112,64,.10), 0 4px 16px rgba(128,112,64,.08);
      --shadow-lg: 0 8px 32px rgba(128,112,64,.14);

      --font: 'Lato', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      font-size: 0.9375rem;
      line-height: 1.7;
      color: var(--color-text);
      background: var(--color-bg);
      min-height: 100vh;
    }
    a { color: var(--color-accent); text-decoration: none; }
    a:hover { color: var(--color-accent-deep); text-decoration: underline; }

    /* ── Navbar ── */
    .navbar {
      background: var(--color-text);
      color: #fff;
      height: 60px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(42,31,0,.25);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--amber);
      font-weight: 700;
      font-size: 1.2rem;
      font-style: italic;
      letter-spacing: -0.01em;
      text-decoration: none;
      flex-shrink: 0;
    }
    .navbar-brand:hover { color: var(--amber); text-decoration: none; opacity: .88; }

    /* Gem SVG inline — âmbar estilizado */
    .navbar-gem {
      width: 24px; height: 24px;
      flex-shrink: 0;
    }

    .navbar-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,.15);
      margin: 0 1.5rem;
      flex-shrink: 0;
    }

    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 0.125rem;
      list-style: none;
    }
    .navbar-nav a {
      color: rgba(255,255,255,.72);
      font-size: 0.8125rem;
      font-weight: 400;
      padding: 0.45rem 0.85rem;
      border-radius: var(--radius);
      transition: color .15s, background .15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .navbar-nav a:hover {
      color: #fff;
      background: rgba(255,191,0,.15);
      text-decoration: none;
    }
    .navbar-nav a.active {
      color: var(--amber);
      background: rgba(255,191,0,.12);
    }

    .navbar-spacer { flex: 1; }

    .navbar-home-link {
      color: rgba(255,255,255,.5);
      font-size: 0.75rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: var(--radius);
      transition: all .15s;
      text-decoration: none;
      margin-left: 1rem;
      flex-shrink: 0;
    }
    .navbar-home-link:hover {
      color: var(--amber);
      border-color: rgba(255,191,0,.4);
      text-decoration: none;
    }

    /* ── Layout ── */
    .container { max-width: 1120px; margin: 0 auto; padding: 2rem 1.5rem; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      gap: 1rem;
      flex-wrap: wrap;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--amber);
    }
    .page-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--color-text);
    }

    /* ── Botões ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .375rem;
      padding: .5rem 1.1rem;
      border-radius: var(--radius);
      font-size: .8125rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background .15s, border-color .15s, color .15s, transform .1s;
      text-decoration: none;
      letter-spacing: .01em;
    }
    .btn:hover { text-decoration: none; transform: translateY(-1px); }
    .btn:active { transform: none; }

    .btn-primary {
      background: var(--amber);
      color: var(--color-text);
      border-color: var(--amber);
    }
    .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); color: var(--color-text); }

    .btn-secondary {
      background: transparent;
      border-color: var(--color-border);
      color: var(--color-text-muted);
    }
    .btn-secondary:hover { background: #F5ECC8; border-color: var(--amber-dark); color: var(--color-text); }

    .btn-accent {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .btn-accent:hover { background: var(--blue-deep); border-color: var(--blue-deep); color: #fff; }

    .btn-danger { background: #C0392B; color: #fff; border-color: #C0392B; }
    .btn-danger:hover { background: #992D22; border-color: #992D22; color: #fff; }

    .btn-warning { background: var(--amber-dark); color: #fff; border-color: var(--amber-dark); }
    .btn-warning:hover { background: #6A5A30; border-color: #6A5A30; color: #fff; }

    .btn-sm { padding: .3rem .75rem; font-size: .75rem; }

    /* ── Cards ── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }
    .card + .card { margin-top: 1rem; }

    /* ── Tabelas ── */
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      text-align: left;
      padding: .65rem .85rem;
      border-bottom: 2px solid var(--amber);
      font-weight: 700;
      color: var(--color-text-muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }
    td { padding: .7rem .85rem; border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FFFBEC; }

    /* ── Formulários ── */
    .form-section { margin-bottom: 2rem; }
    .form-section-title {
      font-size: .9375rem;
      font-weight: 700;
      color: var(--amber-dark);
      border-bottom: 2px solid var(--amber);
      padding-bottom: .4rem;
      margin-bottom: 1rem;
    }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .35rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .8125rem; font-weight: 700; color: var(--color-text-muted); }
    .form-control {
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius);
      padding: .5rem .75rem;
      font-size: .9rem;
      font-family: var(--font);
      color: var(--color-text);
      background: #fff;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(255,191,0,.18);
    }

    /* Checkboxes */
    .checkbox-list { list-style: none; display: flex; flex-wrap: wrap; gap: .5rem; }
    .checkbox-list li label {
      display: flex; align-items: center; gap: .35rem;
      font-weight: 600; font-size: .8125rem; color: var(--color-text);
      cursor: pointer; background: #FFF8DC;
      padding: .25rem .7rem; border-radius: 999px;
      border: 1px solid var(--amber);
    }
    .checkbox-list li input[type=checkbox] { accent-color: var(--amber-dark); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .2rem .65rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .03em;
    }
    .badge-active   { background: #D4F0DC; color: #1A5C2F; }
    .badge-inactive { background: #F5DCDC; color: #7C1C1C; }
    .badge-esp      { background: #FFF0B0; color: #6B4D00; border: 1px solid #E8D070; }
    .badge-pendente { background: #FFF3CD; color: #7A5500; }
    .badge-confirmado { background: #D4F0DC; color: #1A5C2F; }
    .badge-erro     { background: #F5DCDC; color: #7C1C1C; }
    .badge-ignorado { background: #EEEEEE; color: #666; }

    /* ── Mensagens ── */
    .messages { list-style: none; margin-bottom: 1.25rem; }
    .messages li {
      padding: .85rem 1.1rem;
      border-radius: var(--radius);
      font-size: .875rem;
      margin-bottom: .5rem;
      border-left: 4px solid transparent;
    }
    .messages .success { background: #EDF7F1; color: #1A5C2F; border-left-color: #2EAA57; }
    .messages .error   { background: #FDF0EF; color: #7C1C1C; border-left-color: #C0392B; }
    .messages .warning { background: #FFFAE5; color: #7A5500; border-left-color: var(--amber); }
    .messages .info    { background: #EBF4FF; color: #003A80; border-left-color: var(--blue); }

    /* ── Formsets ── */
    .formset-row {
      background: #FFFDF5;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: .75rem;
      position: relative;
    }
    .formset-delete { position: absolute; top: .75rem; right: .75rem; }
    .formset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; }

    /* ── Busca ── */
    .search-bar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1.25rem; }
    .search-bar .form-control { max-width: 280px; }

    /* ── Detalhe ── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-label { font-size: .75rem; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .detail-value { font-size: .9375rem; margin-top: .15rem; }

    .valor-box {
      background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dark) 100%);
      color: var(--color-text);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex; flex-direction: column; gap: .25rem;
    }
    .valor-box .label { font-size: .8rem; opacity: .75; font-weight: 700; }
    .valor-box .value { font-size: 1.5rem; font-weight: 900; }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--amber);
      background: #FFFBEC;
    }
    .drop-zone-icon { font-size: 2.5rem; margin-bottom: .75rem; }

    /* ── Extrato ── */
    .extrato-box {
      background: #FFFBEC;
      border: 1px solid var(--amber);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .extrato-campo {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: .5rem;
      padding: .4rem 0;
      border-bottom: 1px solid #F0E4A0;
      font-size: .875rem;
    }
    .extrato-campo:last-child { border-bottom: none; }
    .extrato-campo .chave { font-weight: 700; color: var(--color-text-muted); }
    .extrato-campo .valor { color: var(--color-text); }
    .extrato-campo .valor.ausente { color: var(--color-error); font-style: italic; }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .formset-grid { grid-template-columns: 1fr; }
      .extrato-campo { grid-template-columns: 1fr; }
      .navbar { padding: 0 1rem; }
      .navbar-divider { margin: 0 .75rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="{% url 'cadastro:home' %}">
      <!-- Âmbar gem SVG -->
      <svg class="navbar-gem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="12" cy="13" rx="8.5" ry="7" fill="#FFBF00" opacity=".9"/>
        <ellipse cx="12" cy="13" rx="8.5" ry="7" fill="url(#gem-grad)" opacity=".6"/>
        <ellipse cx="12" cy="13" rx="6" ry="4.8" fill="#FFD84D" opacity=".5"/>
        <defs>
          <radialGradient id="gem-grad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#FFE680"/>
            <stop offset="100%" stop-color="#C87000"/>
          </radialGradient>
        </defs>
      </svg>
      Âmbar
    </a>

    <div class="navbar-divider"></div>

    <ul class="navbar-nav">
      <li><a href="{% url 'cadastro:acompanhamento' %}">Acompanhamento</a></li>
      <li><a href="{% url 'cadastro:relatorio' %}">Relatório</a></li>
      <li><a href="{% url 'cadastro:prestador_list' %}">Prestadores</a></li>
      <li><a href="{% url 'cadastro:contrato_upload' %}">Contratos</a></li>
    </ul>

    <div class="navbar-spacer"></div>

    <a href="{% url 'cadastro:home' %}" class="navbar-home-link">AME Caraguatatuba</a>
  </nav>

  <div class="container">
    {% if messages %}
    <ul class="messages">
      {% for msg in messages %}
      <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
